```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

    <h1>Employee Dashboard</h1>

    <div class="profile-card">

        <img src="https://via.placeholder.com/150" class="profile-image">

        <h2 id="employeeName">Employee Name</h2>

        <p>Employee ID : <span id="employeeId"></span></p>

        <p>Department : <span id="department"></span></p>

        <p>Designation : <span id="designation"></span></p>

    </div>

    <div class="attendance-card">

        <h2>Attendance</h2>

        <button onclick="checkIn()">Check In</button>

        <br><br>

        <button onclick="checkOut()">Check Out</button>

        <br><br>

        <h3>Check In Time :</h3>

        <p id="checkInTime">--:--</p>

        <h3>Check Out Time :</h3>

        <p id="checkOutTime">--:--</p>

        <h3>Working Hours :</h3>

        <p id="workingHours">00 Hours 00 Minutes</p>

        <hr>

        <h2>Attendance History</h2>

        <table border="1" cellpadding="10">

            <thead>

                <tr>

                    <th>Date</th>
                    <th>Check In</th>
                    <th>Check Out</th>
                    <th>Working Hours</th>

                </tr>

            </thead>

            <tbody id="attendanceTable">

            </tbody>

        </table>

    </div>

    <br>

    <button onclick="logout()">Logout</button>

</div>

<script src="script.js"></script>

</body>
</html>
```

<head>
    <meta charset="UTF-8">

</head>
<body>

<div class="dashboard">

                <th>Employee ID</th>

                <th>Department</th>
                <th>Status</th>

            </tr>

        </thead>

        <tbody id="adminAttendanceTable">

        </tbody>

    </table>

    <br>

    <button onclick="logout()">Logout</button>

</div>
